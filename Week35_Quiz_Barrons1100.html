<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 35 &mdash; Barron&apos;s 1100 SAT Vocabulary Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --primary: #1a3a5c; --primary-light: #2a5080; --accent: #c8962e; --accent-light: #f0c060;
  --correct: #2d7a4f; --correct-bg: #e8f5ee; --wrong: #b53a2f; --wrong-bg: #fdecea;
  --clue: #fff3a3; --surface: #f5f3ef; --card: #ffffff; --text: #1c1c1c;
  --muted: #6b7280; --border: #ddd8d0; --radius: 12px; --radius-sm: 8px;
  --shadow: 0 4px 16px rgba(0,0,0,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; }
.header {
  background: var(--primary); color: #fff; padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.18);
}
.header-logo { font-family: 'Playfair Display', serif; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
.header-logo i { color: var(--accent-light); }
.score-pill {
  background: rgba(255,255,255,0.13); border: 1px solid rgba(255,255,255,0.22);
  border-radius: 20px; padding: 5px 14px; font-size: 0.82rem; font-weight: 500;
  display: flex; align-items: center; gap: 7px;
}
.score-pill span { color: var(--accent-light); font-weight: 700; font-size: 0.95rem; }
.wrap { max-width: 800px; margin: 0 auto; padding: 24px 16px 60px; }
.prog-row { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); font-weight: 500; margin-bottom: 7px; }
.prog-track { background: var(--border); border-radius: 99px; height: 5px; margin-bottom: 22px; }
.prog-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width .4s ease; }
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px; animation: up .3s ease; }
@keyframes up { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
.card-head {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: #fff; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between;
}
.q-num { font-family: 'Playfair Display', serif; font-size: 0.9rem; opacity: .9; }
.tts-btn {
  background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.28);
  color: #fff; border-radius: 18px; padding: 5px 12px;
  font-size: 0.78rem; font-family: 'DM Sans', sans-serif; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background .2s;
}
.tts-btn:hover { background: rgba(255,255,255,0.26); }
.tts-btn.on { background: rgba(200,150,46,0.45); }
.card-body { padding: 22px 22px 18px; }
.helper {
  background: #fffbf0; border: 1px solid #f0d080; border-left: 4px solid var(--accent);
  border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 16px;
  font-size: 0.86rem; line-height: 1.5; display: none; animation: fadein .2s;
}
.helper.show { display: block; }
@keyframes fadein { from{opacity:0} to{opacity:1} }
.helper-word { font-weight: 700; color: var(--accent); font-size: 0.95rem; margin-bottom: 3px; }
.helper-pos { color: var(--muted); font-style: italic; font-size: 0.8rem; }
.passage { font-size: 1rem; line-height: 1.85; font-weight: 300; margin-bottom: 20px; }
.passage .w {
  cursor: pointer; border-bottom: 1px dashed rgba(26,58,92,0.22);
  border-radius: 2px; padding: 0 1px; transition: color .15s, background .15s;
}
.passage .w:hover { color: var(--primary); background: rgba(26,58,92,0.06); border-bottom-color: var(--primary); }
.passage .blank { font-weight: 700; font-family: 'Playfair Display', serif; color: var(--primary); border-bottom: 2px solid var(--primary); letter-spacing: .04em; cursor: default; padding: 0 2px; }
.passage .clue { background: var(--clue); border-radius: 3px; padding: 0 3px; border-bottom: none; }
.opts { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 16px; }
@media(max-width:480px){ .opts { grid-template-columns: 1fr; } }
.opt {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: var(--radius-sm); padding: 11px 14px;
  font-size: 0.9rem; font-family: 'DM Sans', sans-serif; font-weight: 500;
  cursor: pointer; text-align: left; transition: border-color .2s, background .2s, transform .1s;
  display: flex; align-items: center; gap: 9px; color: var(--text);
}
.opt:hover:not(:disabled) { border-color: var(--primary); background: rgba(26,58,92,0.05); transform: translateY(-1px); }
.opt-lbl { width: 22px; height: 22px; border-radius: 50%; background: var(--primary); color: #fff; font-size: 0.72rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.opt.correct { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); }
.opt.correct .opt-lbl { background: var(--correct); }
.opt.wrong { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); }
.opt.wrong .opt-lbl { background: var(--wrong); }
.opt:disabled { cursor: default; transform: none; }
.feedback { display: none; border-top: 1px solid var(--border); padding-top: 16px; margin-top: 4px; animation: fadein .3s; }
.feedback.show { display: block; }
.fb-title { font-size: 0.76rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 600; margin-bottom: 10px; }
.fb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media(max-width:480px){ .fb-grid { grid-template-columns: 1fr; } }
.fb-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 0.82rem; }
.fb-item.is-ans { border-color: var(--correct); background: var(--correct-bg); }
.fb-word { font-weight: 700; font-size: 0.92rem; color: var(--primary); margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; }
.fb-tts { background: none; border: none; color: var(--muted); cursor: pointer; padding: 2px; font-size: 0.85rem; transition: color .2s; }
.fb-tts:hover { color: var(--primary); }
.fb-en { color: var(--text); margin-bottom: 3px; }
.fb-cn { color: #6a4c93; font-size: 0.83rem; margin-bottom: 5px; }
.fb-ex { font-size: 0.78rem; color: var(--muted); font-style: italic; border-top: 1px solid var(--border); padding-top: 5px; margin-top: 3px; display: flex; align-items: flex-start; gap: 5px; }
.fb-ex-tts { background: none; border: none; color: var(--muted); cursor: pointer; padding: 0; font-size: 0.82rem; flex-shrink: 0; transition: color .2s; }
.fb-ex-tts:hover { color: var(--accent); }
.next-btn {
  display: none; margin-top: 16px; width: 100%;
  background: var(--primary); color: #fff; border: none;
  border-radius: var(--radius-sm); padding: 12px 24px;
  font-size: 0.92rem; font-family: 'DM Sans', sans-serif; font-weight: 600;
  cursor: pointer; align-items: center; justify-content: center; gap: 7px;
  transition: background .2s, transform .1s;
}
.next-btn.show { display: flex; }
.next-btn:hover { background: var(--primary-light); transform: translateY(-1px); }
.hint { font-size: 0.75rem; color: var(--muted); text-align: center; margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 4px; }
/* END SCREEN */
.end { display: none; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 40px 28px; text-align: center; animation: up .4s ease; }
.end.show { display: block; }
.end-icon { font-size: 2.8rem; margin-bottom: 14px; }
.end-title { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--primary); margin-bottom: 6px; }
.end-score { font-size: 3.2rem; font-weight: 700; color: var(--accent); line-height: 1; margin: 18px 0 6px; }
.end-pct { color: var(--muted); font-size: 0.88rem; margin-bottom: 20px; }
.end-msg { font-size: 0.97rem; margin-bottom: 5px; line-height: 1.6; }
.end-cn { color: #6a4c93; font-size: 0.93rem; margin-bottom: 28px; }
/* REVIEW WORD CARDS */
.review-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 20px; text-align: left; }
.review-section-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.review-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.review-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; cursor: pointer; transition: border-color .2s, box-shadow .2s; }
.review-card:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(26,58,92,0.1); }
.review-card.wrong-card { border-left: 3px solid var(--wrong); }
.review-card.passage-card { border-left: 3px solid var(--accent); }
.review-card .rc-word { font-weight: 700; font-size: 0.95rem; color: var(--primary); display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.review-card .rc-pos { font-size: 0.75rem; color: var(--muted); font-style: italic; margin-bottom: 4px; }
.review-card .rc-en { font-size: 0.82rem; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
.review-card .rc-cn { font-size: 0.82rem; color: #6a4c93; margin-bottom: 6px; }
.review-card .rc-ex { font-size: 0.78rem; color: var(--muted); font-style: italic; border-top: 1px solid var(--border); padding-top: 6px; margin-top: 4px; display: flex; align-items: flex-start; gap: 5px; line-height: 1.45; }
.rc-tts { background: none; border: none; cursor: pointer; color: var(--muted); padding: 2px 4px; font-size: 0.88rem; transition: color .2s; flex-shrink: 0; }
.rc-tts:hover { color: var(--accent); }
.review-card .rc-detail { display: none; }
.review-card.open .rc-detail { display: block; }
.review-card .rc-toggle { color: var(--accent); font-size: 0.75rem; }
/* SUBMIT FORM */
.submit-section { background: #f0f8ff; border: 1px solid #b8d8f0; border-radius: var(--radius-sm); padding: 18px 20px; margin-bottom: 20px; text-align: left; }
.submit-title { font-weight: 600; color: var(--primary); margin-bottom: 4px; font-size: 0.95rem; }
.submit-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 14px; }
.submit-row { display: flex; gap: 10px; flex-wrap: wrap; }
.submit-input { flex: 1; min-width: 180px; padding: 10px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 0.92rem; font-family: 'DM Sans', sans-serif; color: var(--text); background: #fff; transition: border-color .2s; }
.submit-input:focus { outline: none; border-color: var(--primary); }
.submit-btn { background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px 22px; font-size: 0.92rem; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; transition: background .2s; white-space: nowrap; display: flex; align-items: center; gap: 7px; }
.submit-btn:hover:not(:disabled) { background: var(--primary-light); }
.submit-btn:disabled { opacity: .6; cursor: default; }
.submit-status { margin-top: 10px; font-size: 0.84rem; display: none; padding: 8px 12px; border-radius: var(--radius-sm); }
.submit-status.ok { display: block; background: var(--correct-bg); color: var(--correct); border: 1px solid #b0e0c0; }
.submit-status.err { display: block; background: var(--wrong-bg); color: var(--wrong); border: 1px solid #f0c0bb; }
.restart-btn { background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); padding: 13px 32px; font-size: 0.97rem; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; transition: background .2s; }
.restart-btn:hover { background: var(--primary-light); }
</style>
</head>

  </div>
</div>

<script>
(function() {
  // Safely decode base64 data — immune to apostrophes, Chinese characters, quotes
  var raw = document.getElementById('quizData').textContent.trim();
  var bytes = atob(raw);
  var arr = new Uint8Array(bytes.length);
  for (var i = 0; i < bytes.length; i++) { arr[i] = bytes.charCodeAt(i); }
  var decoded = JSON.parse(new TextDecoder('utf-8').decode(arr));
  var questions = decoded.questions;
  var vocab = decoded.vocab;

  var cur = 0, score = 0, answered = false;
  var wrongWords = [];
  var passageClickedWords = [];

  // Wire up all button listeners (no inline onclick needed)
  document.getElementById('ttsBtn').addEventListener('click', speakPassage);
  document.getElementById('nextBtn').addEventListener('click', nextQ);
  document.getElementById('submitBtn').addEventListener('click', submitScore);
  document.getElementById('restartBtn').addEventListener('click', restart);

  // Word lookup via event delegation on passage
  document.getElementById('passage').addEventListener('click', function(e) {
    var el = e.target.closest('.w');
    if (el) lookup(el);
  });

  // Init
  speechSynthesis.getVoices();
  render();

  // ══ RENDER ══
  function render() {
    var q = questions[cur];
    answered = false;
    var pct = Math.round(cur / questions.length * 100);
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progLabel').textContent = 'Question ' + (cur+1) + ' of ' + questions.length;
    document.getElementById('progPct').textContent = pct + '%';
    document.getElementById('qNum').textContent = 'Question ' + (cur+1);
    document.getElementById('scoreDisp').textContent = score;
    document.getElementById('totalDisp').textContent = questions.length;
    document.getElementById('helper').classList.remove('show');
    document.getElementById('passage').innerHTML = q.rendered;
    var labels = ['A','B','C','D'];
    var grid = document.getElementById('opts');
    grid.innerHTML = '';
    q.opts.forEach(function(word, i) {
      var btn = document.createElement('button');
      btn.className = 'opt';
      btn.innerHTML = '<span class="opt-lbl">' + labels[i] + '</span>' + esc(word);
      btn.addEventListener('click', function() { handleAnswer(word, btn); });
      grid.appendChild(btn);
    });
    document.getElementById('feedback').classList.remove('show');
    var nb = document.getElementById('nextBtn');
    nb.classList.remove('show');
    nb.style.display = 'none';
    var card = document.getElementById('qCard');
    card.style.animation = 'none'; void card.offsetWidth; card.style.animation = 'up .3s ease';
  }

  // ══ LOOKUP ══
  function lookup(el) {
    var word = el.dataset.w;
    var h = document.getElementById('helper');
    h.classList.add('show');
    document.getElementById('helperWord').textContent = word;
    document.getElementById('helperCn').textContent = '';
    if (!passageClickedWords.includes(word) && word.length > 2) {
      passageClickedWords.push(word);
    }
    if (vocab[word]) {
      var d = vocab[word];
      document.getElementById('helperPos').textContent = d.pos;
      document.getElementById('helperDef').textContent = d.en;
      document.getElementById('helperCn').textContent = '🇹🇼 ' + d.cn;
      return;
    }
    // Non-vocab word: look up via dictionary API
    var skipWords = ['the','a','an','and','or','but','in','on','at','to','for','of','with','by','from','as','is','was','are','were','be','been','being','have','has','had','do','does','did','will','would','could','should','may','might','shall','must','that','this','these','those','it','its','he','she','they','we','you','his','her','their','our','your','my','not','no','so','if','when','than','then','into','out','up','about','also','just','more','such','each','which','who','whom','whose','how','what','where','there','here','both','all','any','some','most','other','one','two','three','many','much'];
    if (skipWords.indexOf(word) !== -1 || word.length <= 2) {
      document.getElementById('helperPos').textContent = '';
      document.getElementById('helperDef').innerHTML = '<em style="color:var(--muted)">Try clicking a less common word for a definition.</em>';
      return;
    }
    document.getElementById('helperPos').textContent = '';
    document.getElementById('helperDef').innerHTML = '<span style="color:var(--muted);font-style:italic">Looking up &ldquo;' + esc(word) + '&rdquo;&hellip;</span>';
    var apiUrl = 'https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(word);
    fetch(apiUrl)
      .then(function(r) { if (!r.ok) throw 0; return r.json(); })
      .then(function(data) {
        var m = data[0] && data[0].meanings && data[0].meanings[0];
        if (m) {
          document.getElementById('helperPos').textContent = m.partOfSpeech || '';
          document.getElementById('helperDef').textContent = (m.definitions[0] && m.definitions[0].definition) || 'No definition found.';
        } else throw 0;
      })
      .catch(function() {
        document.getElementById('helperDef').innerHTML = '<em style="color:var(--muted)">Definition not found &mdash; try clicking another word.</em>';
      });
  }

  // ══ ANSWER ══
  function handleAnswer(chosen, btn) {
    if (answered) return;
    answered = true;
    var q = questions[cur];
    var correct = chosen === q.answer;
    if (correct) score++;
    else if (wrongWords.indexOf(q.answer) === -1) wrongWords.push(q.answer);
    document.getElementById('scoreDisp').textContent = score;
    document.querySelectorAll('.opt').forEach(function(b) {
      b.disabled = true;
      var word = b.textContent.trim().replace(/^[A-D]/, '').trim();
      if (word === q.answer) b.classList.add('correct');
      else if (b === btn && !correct) b.classList.add('wrong');
    });
    document.querySelectorAll('#passage .w').forEach(function(s) {
      if (q.clues.some(function(c) { return c.toLowerCase() === s.dataset.w; })) s.classList.add('clue');
    });
    buildFeedback(q);
    document.getElementById('feedback').classList.add('show');
    var nb = document.getElementById('nextBtn');
    nb.style.display = 'flex'; nb.classList.add('show');
    nb.innerHTML = cur < questions.length - 1
      ? 'Next question <i class="fas fa-arrow-right"></i>'
      : 'See results <i class="fas fa-flag-checkered"></i>';
  }

  // ══ FEEDBACK ══
  function buildFeedback(q) {
    var grid = document.getElementById('fbGrid');
    grid.innerHTML = '';
    q.opts.forEach(function(word) {
      var d = vocab[word] || { pos:'', en:'&mdash;', cn:'&mdash;', ex:'&mdash;' };
      var isAns = word === q.answer;
      var item = document.createElement('div');
      item.className = 'fb-item' + (isAns ? ' is-ans' : '');
      var exText = d.ex || '';
      item.innerHTML =
        '<div class="fb-word">' +
          '<span>' + esc(word) + (isAns ? ' ✓' : '') + '</span>' +
          '<button class="fb-tts" data-speak="' + escAttr(word) + '"><i class="fas fa-volume-low"></i></button>' +
        '</div>' +
        '<div class="fb-en">' + esc(d.en) + '</div>' +
        '<div class="fb-cn">' + esc(d.cn) + '</div>' +
        '<div class="fb-ex">' +
          '<button class="fb-ex-tts" data-speak="' + escAttr(exText) + '"><i class="fas fa-play-circle"></i></button>' +
          '<span>' + esc(exText) + '</span>' +
        '</div>';
      grid.appendChild(item);
    });
    // TTS on feedback via delegation
    grid.querySelectorAll('[data-speak]').forEach(function(btn) {
      btn.addEventListener('click', function() { say(btn.getAttribute('data-speak')); });
    });
  }

  // ══ NAVIGATION ══
  function nextQ() {
    cur++;
    if (cur >= questions.length) showEnd();
    else render();
  }

  // ══ END SCREEN ══
  function showEnd() {
    document.getElementById('quizArea').style.display = 'none';
    var end = document.getElementById('endScreen');
    end.classList.add('show');
    document.getElementById('progFill').style.width = '100%';
    document.getElementById('progLabel').textContent = 'Quiz complete!';
    document.getElementById('progPct').textContent = '100%';
    var pct = Math.round(score / questions.length * 100);
    document.getElementById('endScore').textContent = score + '/' + questions.length;
    document.getElementById('endPct').textContent = pct + '% correct';
    var icon, msg, cn;
    if (pct === 100) { icon='🏆'; msg="Perfect score! Absolutely outstanding vocabulary mastery."; cn="滿分！詞彙能力非常出色！"; }
    else if (pct >= 80) { icon='🌟'; msg="Excellent work! You have a strong command of these SAT words."; cn="表現優異！對這些SAT單字掌握得很好。"; }
    else if (pct >= 60) { icon='📚'; msg="Good effort! Review the words you missed and try again."; cn="表現不錢！複習答錯的單字再試一次。"; }
    else { icon='💪'; msg="Keep practising — every attempt builds stronger vocabulary!"; cn="繼續加油！每次練習都能讓詞彙更進步！"; }
    document.getElementById('endIcon').textContent = icon;
    document.getElementById('endMsg').textContent = msg;
    document.getElementById('endCn').textContent = cn;

    // Wrong words review cards
    var wb = document.getElementById('wrongBox');
    if (wrongWords.length === 0) {
      wb.innerHTML = '<div class="review-section"><div class="review-section-title" style="color:var(--correct)"><i class="fas fa-check-circle"></i> Perfect — no words to review!</div></div>';
    } else {
      var cards = wrongWords.map(function(w) { return makeReviewCard(w, 'wrong-card'); }).join('');
      wb.innerHTML = '<div class="review-section">' +
        '<div class="review-section-title">' +
          '<i class="fas fa-circle-exclamation" style="color:var(--wrong)"></i>' +
          ' Words to review — ' + wrongWords.length + ' missed' +
          '<span style="font-size:0.75rem;color:var(--muted);font-weight:400;margin-left:4px">(click any word to expand)</span>' +
        '</div>' +
        '<div class="review-cards">' + cards + '</div>' +
        '<div style="margin-top:10px;font-size:0.78rem;color:var(--muted)">These words are included in your teacher’s results report.</div>' +
      '</div>';
    }

    // Passage clicked words
    var pb = document.getElementById('passageBox');
    var newWords = passageClickedWords.filter(function(w) { return w.length > 2; });
    if (newWords.length > 0) {
      var pcards = newWords.map(function(w) { return makeReviewCard(w, 'passage-card'); }).join('');
      pb.innerHTML = '<div class="review-section">' +
        '<div class="review-section-title">' +
          '<i class="fas fa-magnifying-glass" style="color:var(--accent)"></i>' +
          ' Additional new words found in the passages — ' + newWords.length + ' words' +
          '<span style="font-size:0.75rem;color:var(--muted);font-weight:400;margin-left:4px">(click any word to expand)</span>' +
        '</div>' +
        '<div class="review-cards">' + pcards + '</div>' +
      '</div>';
    } else {
      pb.innerHTML = '';
    }
  }

  // ══ REVIEW CARDS ══
  function makeReviewCard(word, cardClass) {
    var d = vocab[word];
    var id = 'rc_' + word.replace(/[^a-z0-9]/g, '');
    if (d) {
      return '<div class="review-card ' + cardClass + '" id="' + id + '" data-toggle="' + id + '">' +
        '<div class="rc-word"><span>' + esc(word) + '</span><span class="rc-toggle"><i class="fas fa-chevron-down"></i></span></div>' +
        '<div class="rc-pos">' + esc(d.pos) + '</div>' +
        '<div class="rc-detail">' +
          '<div class="rc-en">' + esc(d.en) + '</div>' +
          '<div class="rc-cn">' + esc(d.cn) + '</div>' +
          '<div class="rc-ex">' +
            '<button class="rc-tts" data-speak="' + escAttr(word) + '"><i class="fas fa-volume-high"></i></button>' +
            '<span>' + esc(d.ex || '') + '</span>' +
          '</div>' +
        '</div>' +
      '</div>';
    } else {
      return '<div class="review-card ' + cardClass + '" id="' + id + '" data-expand="' + esc(word) + '" data-expand-id="' + id + '">' +
        '<div class="rc-word"><span>' + esc(word) + '</span><span class="rc-toggle"><i class="fas fa-chevron-down"></i></span></div>' +
        '<div class="rc-detail" id="' + id + '_detail">' +
          '<div style="color:var(--muted);font-style:italic;font-size:0.8rem">Click to look up...</div>' +
        '</div>' +
      '</div>';
    }
  }

  // Review card click delegation
  document.getElementById('wrongBox').addEventListener('click', handleReviewClick);
  document.getElementById('passageBox').addEventListener('click', handleReviewClick);

  function handleReviewClick(e) {
    var card = e.target.closest('.review-card');
    if (!card) return;
    // TTS button inside card
    var ttsBtn = e.target.closest('.rc-tts');
    if (ttsBtn) { e.stopPropagation(); say(ttsBtn.getAttribute('data-speak')); return; }
    // Toggle card open/closed
    var id = card.id;
    var expandWord = card.getAttribute('data-expand');
    if (expandWord) {
      expandPassageCard(id, expandWord, card);
    } else {
      toggleCard(id);
    }
  }

  function toggleCard(id) {
    var card = document.getElementById(id);
    if (!card) return;
    card.classList.toggle('open');
    var icon = card.querySelector('.rc-toggle i');
    if (icon) icon.className = card.classList.contains('open') ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
  }

  async function expandPassageCard(id, word, card) {
    var detail = document.getElementById(id + '_detail');
    if (card.classList.contains('open')) { toggleCard(id); return; }
    card.classList.add('open');
    var icon = card.querySelector('.rc-toggle i');
    if (icon) icon.className = 'fas fa-chevron-up';
    detail.innerHTML = '<div style="color:var(--muted);font-style:italic;font-size:0.8rem"><i class="fas fa-spinner fa-spin"></i> Looking up...</div>';
    try {
      var res = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(word));
      if (!res.ok) throw 0;
      var data = await res.json();
      var m = data[0] && data[0].meanings && data[0].meanings[0];
      var def = (m && m.definitions && m.definitions[0] && m.definitions[0].definition) || 'No definition found.';
      var pos = (m && m.partOfSpeech) || '';
      var ex = (m && m.definitions && m.definitions[0] && m.definitions[0].example) || '';
      detail.innerHTML =
        '<div class="rc-pos">' + esc(pos) + '</div>' +
        '<div class="rc-en">' + esc(def) + '</div>' +
        (ex ? '<div class="rc-ex"><button class="rc-tts" data-speak="' + escAttr(word + '. ' + ex) + '"><i class="fas fa-volume-high"></i></button><span>' + esc(ex) + '</span></div>' : '');
    } catch(e) {
      detail.innerHTML = '<div style="color:var(--muted);font-style:italic;font-size:0.8rem">Definition not found.</div>';
    }
  }

  // ══ SUBMIT ══
  async function submitScore() {
    var name = document.getElementById('studentName').value.trim();
    var statusEl = document.getElementById('submitStatus');
    if (!name) {
      statusEl.className = 'submit-status err';
      statusEl.textContent = '⚠ Please enter your name before submitting.';
      return;
    }
    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting…';
    statusEl.className = 'submit-status';
    var payload = {
      studentName: name,
      week: 35,
      score: score,
      total: questions.length,
      percent: Math.round(score / questions.length * 100),
      wrongWords: wrongWords.join(', ') || 'none',
      passageWords: passageClickedWords.join(', ') || 'none',
      timestamp: new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' })
    };
    try {
      await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      statusEl.className = 'submit-status ok';
      statusEl.innerHTML = '<i class="fas fa-check-circle"></i> Score submitted successfully! Your teacher can now see your results.';
      btn.innerHTML = '<i class="fas fa-check"></i> Submitted';
      document.getElementById('studentName').disabled = true;
    } catch(e) {
      statusEl.className = 'submit-status err';
      statusEl.innerHTML = '⚠ Submission failed. Please check your internet connection and try again.';
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit';
    }
  }

  // ══ RESTART ══
  function restart() {
    cur = 0; score = 0; wrongWords = []; passageClickedWords = [];
    document.getElementById('endScreen').classList.remove('show');
    document.getElementById('quizArea').style.display = 'block';
    document.getElementById('studentName').value = '';
    document.getElementById('studentName').disabled = false;
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').innerHTML = '<i class="fas fa-paper-plane"></i> Submit';
    document.getElementById('submitStatus').className = 'submit-status';
    render();
  }

  // ══ TTS ══
  function say(text) {
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.9;
    var vs = speechSynthesis.getVoices();
    var f = vs.filter(function(v){return v.lang==='en-US';}).find(function(v){return /female|woman|samantha|karen|victoria|zira/i.test(v.name);});
    if (f) u.voice = f;
    speechSynthesis.speak(u);
  }
  function speakPassage() {
    var q = questions[cur];
    var text = q.raw.replace(/__________/g, 'blank');
    var btn = document.getElementById('ttsBtn');
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.86;
    var vs = speechSynthesis.getVoices();
    var f = vs.filter(function(v){return v.lang==='en-US';}).find(function(v){return /female|woman|samantha|karen|victoria|zira/i.test(v.name);});
    if (f) u.voice = f;
    btn.classList.add('on');
    u.onend = u.onerror = function() { btn.classList.remove('on'); };
    speechSynthesis.speak(u);
  }

  // ══ HTML ESCAPE HELPERS ══
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function escAttr(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  }
})();
</script>
</body>
</html>
