const letters = ['A','B','C','D'];
let currentQ = 0;
let score = 0;
let answered = false;

function startQuiz() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizCard').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentQ];
  document.getElementById('qNum').textContent = 'Question ' + (currentQ + 1);
  document.getElementById('progressText').textContent = 'Question ' + (currentQ + 1) + ' of 20';
  document.getElementById('progressBar').style.width = (currentQ / 20 * 100) + '%';
  document.getElementById('wordHelper').classList.remove('visible');
  document.getElementById('feedbackBox').classList.remove('visible');
  document.getElementById('nextBtn').classList.remove('visible');

  // Render passage with clickable words
  const passageEl = document.getElementById('passageText');
  const raw = q.q;
  const tokens = raw.split(/(s+|[.,;:!?"""''—–-]+)/);
  passageEl.innerHTML = tokens.map(tok => {
    if (/s+/.test(tok)) return tok;
    if (tok === '__________') return '<span class="blank">__________</span>';
    const clean = tok.replace(/[^a-zA-Z'-]/g,'');
    if (!clean) return tok;
    return '<span class="word" onclick="lookupWord(\'' + clean.toLowerCase().replace(/'/g,"\'") + '\')">' + tok + '</span>';
  }).join('');

  // Options
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="option-label">' + letters[i] + '</span>' + opt;
    btn.onclick = () => handleAnswer(i, btn);
    grid.appendChild(btn);
  });
}

function handleAnswer(idx, clickedBtn) {
  if (answered) return;
  answered = true;
  const q = questions[currentQ];
  const isCorrect = q.options[idx] === q.answer;
  if (isCorrect) { score++; document.getElementById('scoreNum').textContent = score; }
  
  // Color buttons
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (q.options[i] === q.answer) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('incorrect');
  });

  // Highlight clues
  const passageEl = document.getElementById('passageText');
  const spans = passageEl.querySelectorAll('span.word');
  spans.forEach(span => {
    const text = span.textContent.replace(/[^a-zA-Z'-]/g,'').toLowerCase();
    if (q.clues.map(c=>c.toLowerCase()).includes(text)) span.classList.add('clue-highlight');
  });

  // Show feedback cards
  const grid = document.getElementById('feedbackGrid');
  grid.innerHTML = '';
  q.options.forEach(opt => {
    const def = vocabDefs[opt] || { en: '', cn: '', sentence: '' };
    const card = document.createElement('div');
    card.className = 'feedback-card' + (opt === q.answer ? ' is-answer' : '');
    card.innerHTML = `
      <div class="fc-word">${opt} <button class="fc-tts" onclick="speakWord('${opt}')"><i class="fa fa-volume-up"></i></button></div>
      <div class="fc-en">${def.en}</div>
      <div class="fc-cn">${def.cn}</div>
      <div class="fc-sentence">${def.sentence} <button class="fc-tts" onclick="speakText('${def.sentence.replace(/'/g,"\\'")}')"><i class="fa fa-volume-up"></i></button></div>
    `;
    grid.appendChild(card);
  });
  document.getElementById('feedbackBox').classList.add('visible');
  document.getElementById('nextBtn').classList.add('visible');
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) { showFinal(); return; }
  renderQuestion();
}

function showFinal() {
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressText').textContent = 'Quiz Complete!';
  const pct = Math.round(score / questions.length * 100);
  document.getElementById('finalScore').textContent = score + '/' + questions.length;
  document.getElementById('finalPercent').textContent = pct + '% Correct';
  let msg, cn;
  if (pct >= 90) { msg = "Outstanding! You've mastered this unit."; cn = "出色！你已經掌握了本單元的詞彙。"; }
  else if (pct >= 75) { msg = "Great work! Keep reviewing the words you missed."; cn = "做得好！繼續複習你錯過的單字。"; }
  else if (pct >= 60) { msg = "Good effort! Try again to strengthen your knowledge."; cn = "很努力！再試一次來加強你的記憶。"; }
  else { msg = "Keep practicing! Regular review builds lasting vocabulary."; cn = "繼續練習！定期複習能建立持久的詞彙量。"; }
  document.getElementById('finalMsg').textContent = msg;
  document.getElementById('finalCn').textContent = cn;
  document.getElementById('finalScreen').classList.add('visible');
}

function restartQuiz() {
  currentQ = 0; score = 0;
  document.getElementById('scoreNum').textContent = '0';
  document.getElementById('finalScreen').classList.remove('visible');
  document.getElementById('quizCard').style.display = 'block';
  renderQuestion();
}

function lookupWord(word) {
  const helper = document.getElementById('wordHelper');
  const whWord = document.getElementById('whWord');
  const whDef = document.getElementById('whDef');
  // Check local vocab first
  if (vocabDefs[word]) {
    whWord.textContent = word;
    whDef.textContent = vocabDefs[word].en + ' | ' + vocabDefs[word].cn;
    helper.classList.add('visible');
    return;
  }
  whWord.textContent = word;
  whDef.textContent = 'Looking up...';
  helper.classList.add('visible');
  fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + word)
    .then(r => r.json())
    .then(data => {
      if (Array.isArray(data) && data[0] && data[0].meanings && data[0].meanings[0]) {
        const def = data[0].meanings[0].definitions[0].definition;
        whDef.textContent = def;
      } else { whDef.textContent = 'Definition not found. Try another word.'; }
    }).catch(() => { whDef.textContent = 'Definition not found. Try another word.'; });
}

function speakPassage() {
  if (!window.speechSynthesis) return;
  const raw = questions[currentQ].q.replace(/__________/g, 'blank');
  const utt = new SpeechSynthesisUtterance(raw);
  utt.lang = 'en-US'; utt.rate = 0.92;
  const voices = window.speechSynthesis.getVoices();
  const female = voices.find(v => v.lang.startsWith('en') && /female|woman|samantha|karen|victoria|zira/i.test(v.name));
  if (female) utt.voice = female;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

function speakWord(word) {
  if (!window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-US'; utt.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

function speakText(text) {
  if (!window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US'; utt.rate = 0.9;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

// Preload voices
if (window.speechSynthesis) window.speechSynthesis.getVoices();
</script>
