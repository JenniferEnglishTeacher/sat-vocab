<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week41 Quiz — Barron's 1100 Words</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--font-heading:'Playfair Display',Georgia,serif;--font-body:'DM Sans','Segoe UI',sans-serif;--primary:#1a3a5c;--accent:#c8962e;--correct:#2d7a4f;--incorrect:#b53a2f;--clue:#fff3a3;--surface:#faf8f5;--card:#ffffff;--border:#e0d8cc;--text:#2c2c2c;--muted:#7a7065;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--surface);color:var(--text);min-height:100vh;}
.quiz-header{background:linear-gradient(135deg,var(--primary) 0%,#2a5a8c 100%);color:white;padding:20px 24px;display:flex;justify-content:space-between;align-items:center;}
.quiz-header h1{font-family:var(--font-heading);font-size:1.4rem;font-weight:700;}
.subtitle{font-size:0.82rem;opacity:0.8;margin-top:3px;}
.score-counter{background:rgba(255,255,255,0.15);border-radius:12px;padding:8px 16px;text-align:center;}
.score-num{font-family:var(--font-heading);font-size:1.6rem;font-weight:700;}
.score-label{font-size:0.72rem;opacity:0.8;}
.progress-bar-wrap{background:#e0d8cc;height:6px;}
.progress-bar{height:6px;background:var(--accent);transition:width 0.4s ease;}
.progress-text{text-align:center;font-size:0.82rem;color:var(--muted);padding:8px;background:var(--surface);}
.quiz-card{max-width:780px;margin:24px auto;padding:0 16px 40px;}
.card{background:var(--card);border-radius:16px;box-shadow:0 4px 20px rgba(26,58,92,0.1);overflow:hidden;}
.passage-wrap{padding:24px 28px 16px;border-bottom:1px solid var(--border);}
.passage-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.q-number{font-size:0.8rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
.tts-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:0.82rem;color:var(--primary);transition:all 0.2s;}
.tts-btn:hover{background:var(--primary);color:white;}
.passage-text{font-size:1.02rem;line-height:1.9;color:var(--text);}
.passage-text .word{cursor:pointer;border-bottom:1px dotted var(--muted);border-radius:2px;transition:background 0.15s;}
.passage-text .word:hover{background:#e8f0f7;}
.passage-text .word.clue-highlight{background:var(--clue);border-radius:3px;padding:0 2px;}
.blank{font-weight:700;color:var(--primary);letter-spacing:0.1em;}
.word-helper{margin:0 28px 8px;padding:10px 14px;background:#eef4f8;border-left:3px solid var(--accent);border-radius:4px;font-size:0.88rem;display:none;}
.word-helper.visible{display:block;}
.wh-word{font-weight:700;color:var(--primary);margin-bottom:3px;}
.wh-def{color:var(--muted);}
.options-wrap{padding:16px 28px 20px;}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:560px){.options-grid{grid-template-columns:1fr;}}
.option-btn{padding:12px 18px;background:#f4f0eb;border:2px solid var(--border);border-radius:10px;cursor:pointer;font-family:var(--font-body);font-size:0.95rem;text-align:left;transition:all 0.2s;color:var(--text);font-weight:500;display:flex;align-items:center;}
.option-btn:hover:not(:disabled){border-color:var(--primary);background:#eef4f8;}
.option-btn.correct{background:#e8f5ee;border-color:var(--correct);color:var(--correct);}
.option-btn.incorrect{background:#fceaea;border-color:var(--incorrect);color:var(--incorrect);}
.option-btn:disabled{cursor:default;}
.option-label{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--primary);color:white;font-size:0.75rem;font-weight:700;margin-right:10px;flex-shrink:0;}
.option-btn.correct .option-label{background:var(--correct);}
.option-btn.incorrect .option-label{background:var(--incorrect);}
.feedback-box{margin:0 28px 20px;display:none;}
.feedback-box.visible{display:block;}
.feedback-title{font-weight:700;font-size:0.88rem;color:var(--primary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;}
.feedback-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:560px){.feedback-grid{grid-template-columns:1fr;}}
.feedback-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.feedback-card.is-answer{border-color:var(--correct);background:#e8f5ee;}
.fc-word{font-weight:700;font-size:0.92rem;color:var(--primary);}
.fc-en{font-size:0.82rem;color:var(--muted);margin:2px 0;}
.fc-cn{font-size:0.85rem;color:var(--text);}
.fc-sentence{font-size:0.78rem;color:var(--muted);margin-top:4px;font-style:italic;}
.fc-tts{background:none;border:none;color:var(--accent);cursor:pointer;font-size:0.85rem;padding:2px 4px;}
.nav-wrap{padding:0 28px 24px;display:flex;justify-content:flex-end;}
.next-btn{background:var(--primary);color:white;border:none;border-radius:10px;padding:12px 28px;font-family:var(--font-body);font-size:0.95rem;font-weight:600;cursor:pointer;display:none;transition:background 0.2s;}
.next-btn.visible{display:block;}
.next-btn:hover{background:#2a5a8c;}
.final-screen{display:none;max-width:560px;margin:40px auto;text-align:center;padding:0 16px;}
.final-screen.visible{display:block;}
.final-score{font-family:var(--font-heading);font-size:4rem;color:var(--primary);}
.final-percent{font-size:1.2rem;color:var(--accent);font-weight:600;margin-bottom:12px;}
.final-msg,.final-cn{font-size:0.97rem;color:var(--muted);margin-bottom:6px;}
.restart-btn{margin-top:28px;background:var(--primary);color:white;border:none;border-radius:10px;padding:14px 36px;font-family:var(--font-body);font-size:1rem;font-weight:600;cursor:pointer;}
.restart-btn:hover{background:#2a5a8c;}
.start-screen{max-width:560px;margin:60px auto;text-align:center;padding:0 16px;}
.start-screen h2{font-family:var(--font-heading);font-size:2rem;color:var(--primary);margin-bottom:12px;}
.start-screen p{color:var(--muted);margin-bottom:28px;font-size:0.97rem;}
.start-btn{background:var(--primary);color:white;border:none;border-radius:10px;padding:14px 42px;font-family:var(--font-body);font-size:1rem;font-weight:600;cursor:pointer;}
.start-btn:hover{background:#2a5a8c;}
</style>
</head>
<body>
<div class="quiz-header">
  <div>
    <h1>Week 41 — Barron's 1100 Words</h1>
    <div class="subtitle">EFL SAT Vocabulary Interactive Quiz</div>
  </div>
  <div class="score-counter">

  </div>
</div>

<div class="progress-text" id="progressText">Question 1 of 20</div>
<div class="start-screen" id="startScreen">

  <button class="start-btn" onclick="startQuiz()">Start Quiz →</button>
</div>
<div class="quiz-card" id="quizCard" style="display:none">

      </div>
      <div class="passage-text" id="passageText"></div>
    </div>
    <div class="word-helper" id="wordHelper">
      <div class="wh-word" id="whWord"></div>
      <div class="wh-def" id="whDef"></div>
    </div>
    <div class="options-wrap">
      <div class="options-grid" id="optionsGrid"></div>
    </div>
    <div class="feedback-box" id="feedbackBox">
      <div class="feedback-title">All Options Explained</div>
      <div class="feedback-grid" id="feedbackGrid"></div>
    </div>
    <div class="nav-wrap">
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
    </div>
  </div>
</div>
<div class="final-screen" id="finalScreen">
  <div class="final-score" id="finalScore">0/20</div>
  <div class="final-percent" id="finalPercent"></div>
  <div class="final-msg" id="finalMsg"></div>
  <div class="final-cn" id="finalCn"></div>
  <button class="restart-btn" onclick="restartQuiz()">Try Again ↺</button>
</div>

 the period of market exuberance, declining to participate in the speculative frenzy despite..."},"puerile":{"en":"childishly silly and trivial","cn":"幼稚的；不成熟的","sentence":"The committee rejected the submission as puerile, noting that its superficial engagement with the underlying policy complexity and its reliance on rhetorical ex..."},"pugnacious":{"en":"eager or quick to argue or fight","cn":"好鬥的；好爭論的","sentence":"The pugnacious negotiator's combative style achieved short-term concessions but consistently damaged the long-term relationships that sustained international pa..."},"querulous":{"en":"complaining in a petulant or whining manner","cn":"愛抱怨的；易發牢騷的","sentence":"The querulous patient's constant dissatisfaction with every aspect of her treatment plan exhausted the clinical team's considerable patience, though a perceptiv..."},"quixotic":{"en":"exceedingly idealistic; unrealistic and impractical","cn":"唐吉訶德式的；不切實際的","sentence":"The foundation's quixotic ambition to eradicate urban food insecurity within a single decade through market-based solutions alone struck experienced development..."},"rancorous":{"en":"showing deep-seated resentment or ill will","cn":"深仇大恨的；充滿敵意的","sentence":"The rancorous dispute between the two founding partners ultimately destroyed a company that had been genuinely profitable and well-positioned for continued grow..."},"recalcitrant":{"en":"stubbornly uncooperative; resisting authority","cn":"頑抗的；不服從的","sentence":"The recalcitrant supplier's persistent failure to meet contractual quality standards, combined with repeated refusal to participate in the joint improvement pro..."},"reclusive":{"en":"avoiding the company of others; solitary","cn":"隱居的；避世的","sentence":"The reclusive author granted only a single interview over a twenty-year career, preferring to allow her novels to constitute her entire public presence and resi..."},"refute":{"en":"to prove a statement or theory to be wrong","cn":"反駁；駁倒","sentence":"The independent panel was convened specifically to refute or confirm the original study's controversial findings, employing a substantially larger sample, more ..."},"repudiate":{"en":"to refuse to accept or be associated with","cn":"拒絕接受；否認","sentence":"The candidate was forced to publicly repudiate the endorsement from the extremist organization after political allies made clear that the association would crit..."},"resilient":{"en":"able to recover quickly from difficulties","cn":"有復原力的；能迅速恢復的","sentence":"The organization demonstrated remarkable capacity to remain resilient across multiple consecutive crises, drawing on deep institutional reserves of expertise, e..."},"reticent":{"en":"not revealing one's thoughts readily; reserved","cn":"沉默寡言的；不輕易表露的","sentence":"The scientist was characteristically reticent about discussing her ongoing research before publication, not from any secretiveness about the work itself but fro..."}};
const letters=['A','B','C','D'];
let cur=0,score=0,answered=false;
function startQuiz(){document.getElementById('startScreen').style.display='none';document.getElementById('quizCard').style.display='block';render();}
function render(){
  answered=false;
  const q=questions[cur];
  document.getElementById('qNum').textContent='Question '+(cur+1);
  document.getElementById('progressText').textContent='Question '+(cur+1)+' of 20';
  document.getElementById('progressBar').style.width=(cur/20*100)+'%';
  document.getElementById('wordHelper').classList.remove('visible');
  document.getElementById('feedbackBox').classList.remove('visible');
  document.getElementById('nextBtn').classList.remove('visible');
  document.getElementById('passageText').innerHTML=q.rendered;
  const grid=document.getElementById('optionsGrid');
  grid.innerHTML='';
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML='<span class="option-label">'+letters[i]+'</span>'+opt;
    btn.onclick=()=>handleAnswer(i);
    grid.appendChild(btn);
  });
}
function handleAnswer(idx){
  if(answered)return;
  answered=true;
  const q=questions[cur];
  const ok=q.options[idx]===q.answer;
  if(ok){score++;document.getElementById('scoreNum').textContent=score;}
  document.querySelectorAll('.option-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(q.options[i]===q.answer)btn.classList.add('correct');
    else if(i===idx&&!ok)btn.classList.add('incorrect');
  });
  document.querySelectorAll('#passageText .word').forEach(span=>{
    const inner=span.textContent.replace(/^[^a-zA-Z'-]+/,'').replace(/[^a-zA-Z'-]+$/,'').toLowerCase();
    if(q.clues.map(c=>c.toLowerCase()).includes(inner))span.classList.add('clue-highlight');
  });
  const fg=document.getElementById('feedbackGrid');
  fg.innerHTML='';
  q.options.forEach(opt=>{
    const d=vocabDefs[opt]||{en:'',cn:'',sentence:''};
    const card=document.createElement('div');
    card.className='feedback-card'+(opt===q.answer?' is-answer':'');
    const sEsc=d.sentence.replace(/\/g,'\\').replace(/'/g,"\'");
    card.innerHTML='<div class="fc-word">'+opt+' <button class="fc-tts" onclick="spk(\''+opt+'\')"><i class="fa fa-volume-up"></i></button></div>'
      +'<div class="fc-en">'+d.en+'</div><div class="fc-cn">'+d.cn+'</div>'
      +'<div class="fc-sentence">'+d.sentence+' <button class="fc-tts" onclick="spk(\''+sEsc+'\')"><i class="fa fa-volume-up"></i></button></div>';
    fg.appendChild(card);
  });
  document.getElementById('feedbackBox').classList.add('visible');
  document.getElementById('nextBtn').classList.add('visible');
}
function nextQuestion(){cur++;if(cur>=20){showFinal();return;}render();}
function showFinal(){
  document.getElementById('quizCard').style.display='none';
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('progressText').textContent='Quiz Complete!';
  const pct=Math.round(score/20*100);
  document.getElementById('finalScore').textContent=score+'/20';
  document.getElementById('finalPercent').textContent=pct+'% Correct';
  let msg,cn;
  if(pct>=90){msg="Outstanding! You've mastered this unit.";cn="出色！你已經掌握了本單元的詞彙。";}
  else if(pct>=75){msg="Great work! Keep reviewing the words you missed.";cn="做得好！繼續複習你錯過的單字。";}
  else if(pct>=60){msg="Good effort! Try again to strengthen your knowledge.";cn="很努力！再試一次來加強你的記憶。";}
  else{msg="Keep practicing! Regular review builds lasting vocabulary.";cn="繼續練習！定期複習能建立持久的詞彙量。";}
  document.getElementById('finalMsg').textContent=msg;
  document.getElementById('finalCn').textContent=cn;
  document.getElementById('finalScreen').classList.add('visible');
}
function restartQuiz(){cur=0;score=0;document.getElementById('scoreNum').textContent='0';document.getElementById('finalScreen').classList.remove('visible');document.getElementById('quizCard').style.display='block';render();}
function lookupWord(word){
  const helper=document.getElementById('wordHelper');
  document.getElementById('whWord').textContent=word;
  if(vocabDefs[word]){document.getElementById('whDef').textContent=vocabDefs[word].en+' | '+vocabDefs[word].cn;helper.classList.add('visible');return;}
  document.getElementById('whDef').textContent='Looking up...';helper.classList.add('visible');
  fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word))
    .then(r=>r.json()).then(d=>{
      if(Array.isArray(d)&&d[0]&&d[0].meanings&&d[0].meanings[0])document.getElementById('whDef').textContent=d[0].meanings[0].definitions[0].definition;
      else document.getElementById('whDef').textContent='Definition not found. Try another word.';
    }).catch(()=>{document.getElementById('whDef').textContent='Definition not found. Try another word.';});
}
function speakPassage(){if(!window.speechSynthesis)return;const raw=questions[cur].raw.replace(/__________/g,'blank');say(raw,0.92);}
function spk(t){say(t,0.88);}
function say(t,rate){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=rate;
  const vs=window.speechSynthesis.getVoices();
  const f=vs.find(v=>v.lang.startsWith('en')&&/female|woman|samantha|karen|victoria|zira/i.test(v.name));
  if(f)u.voice=f;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);
}
if(window.speechSynthesis)window.speechSynthesis.getVoices();
